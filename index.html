<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品集</title>

<!-- ═══════════════════════════════════════════════════════════
     ★ 設定區：只需要改這裡 ★
     1. SUPABASE_URL   → Supabase 後台 Settings → API 的 Project URL
     2. SUPABASE_ANON_KEY → 同頁面的 anon / public key（本來就設計成可公開）
     3. SITE_TITLE / SITE_SUBTITLE → 你的站名與副標
     ═══════════════════════════════════════════════════════════ -->
<script>
  const CONFIG = {
    SUPABASE_URL:      "https://afhwwzkfwtfjfbvodgye.supabase.co",
    SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmaHd3emtmd3RmamZidm9kZ3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDY1MjMsImV4cCI6MjA5ODgyMjUyM30.HBxi7WRUof7lxq6ybNfKOagDrX1JsEjGBwqGnXIz-4E",
    SITE_TITLE:        "AI作品集",
    SITE_SUBTITLE:     "生成・輸出・提示詞",
    SEAL_CHAR:         "朮"   // 印章方塊裡的字，通常取名字第一個字
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:   #F7F5F1;
    --ink:     #1C1A17;
    --seal:    #A32E24;
    --stone:   #8B8680;
    --hairline:#E4E0D8;
    --serif: "Noto Serif TC", "PMingLiU", serif;
    --sans:  "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scrollbar-gutter: stable; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 24px 64px;
  }

  /* ── 頁首：直排標題 + 印章 ─────────────────────── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    padding: 56px 0 40px;
    border-bottom: 1px solid var(--hairline);
  }

  .masthead { display: flex; align-items: flex-start; gap: 20px; }

  h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 34px;
    letter-spacing: 0.14em;
    line-height: 1.3;
  }

  .subtitle {
    color: var(--stone);
    font-size: 13px;
    letter-spacing: 0.22em;
    margin-top: 10px;
  }

  .seal {
    flex: none;
    width: 44px;
    height: 44px;
    background: var(--seal);
    color: var(--paper);
    font-family: var(--serif);
    font-weight: 600;
    font-size: 24px;
    display: grid;
    place-items: center;
    border-radius: 3px;
    margin-top: 4px;
    user-select: none;
  }

  .count {
    color: var(--stone);
    font-size: 12px;
    letter-spacing: 0.18em;
    padding-top: 12px;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  /* 桌面版：站名改為直排，呼應中文排版傳統 */
  @media (min-width: 720px) {
    header { padding: 72px 0 48px; }
    .titles {
      writing-mode: vertical-rl;
      min-height: 170px;
    }
    h1 {
      font-size: 30px;
      letter-spacing: 0.32em;
      margin-block-end: 14px;
    }
    .subtitle {
      letter-spacing: 0.34em;
      margin: 0;
    }
    .masthead { gap: 22px; }
    .seal { align-self: flex-end; margin-top: 0; }
  }

  /* ── 分類篩選 ─────────────────────────────────── */
  .filters {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    padding: 24px 0 4px;
  }
  .filters.visible { display: flex; }

  .chip {
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--stone);
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 5px 16px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .chip:hover { color: var(--ink); border-color: var(--stone); }
  .chip.active {
    color: var(--seal);
    border-color: var(--seal);
  }

  /* ── 作品牆（拼圖式瀑布流：左到右填滿、自動往下） ── */
  .gallery {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding-top: 28px;
  }
  .gcol {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  @media (min-width: 720px) {
    .gallery { gap: 20px; }
    .gcol    { gap: 24px; }
  }

  .card {
    cursor: zoom-in;
    border: none;
    background: none;
    padding: 0;
    width: 100%;
    text-align: left;
    font: inherit;
    color: inherit;
    animation: rise .5s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }

  .card img {
    width: 100%;
    display: block;
    background: var(--hairline);
    border-radius: 2px;
    transition: opacity .25s;
  }
  .card:hover img { opacity: 0.92; }

  .card .caption {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 2px 0;
  }
  .card .mark {
    flex: none;
    width: 7px;
    height: 7px;
    background: var(--seal);
    border-radius: 1px;
    transform: translateY(-1px);
  }
  .card .title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.06em;
  }
  .card .cat {
    color: var(--stone);
    font-size: 12px;
    letter-spacing: 0.12em;
    margin-left: auto;
    white-space: nowrap;
  }

  .card:focus-visible {
    outline: 2px solid var(--seal);
    outline-offset: 4px;
    border-radius: 2px;
  }

  /* ── 載入 / 空白 / 錯誤狀態 ──────────────────── */
  .skeleton {
    border-radius: 2px;
    background: linear-gradient(100deg, #ECE9E2 40%, #F3F0EA 50%, #ECE9E2 60%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite linear;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .notice {
    max-width: 520px;
    margin: 72px auto;
    text-align: center;
  }
  .notice .glyph {
    font-family: var(--serif);
    font-size: 30px;
    color: var(--seal);
    margin-bottom: 16px;
  }
  .notice h2 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .notice p { color: var(--stone); font-size: 14px; }
  .notice code {
    background: #EEEBE4;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 13px;
  }

  /* ── 燈箱 ─────────────────────────────────────── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(20, 18, 15, 0.94);
    display: none;
    z-index: 50;
  }
  .lightbox.open { display: block; }

  .lb-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 64px 40px;
  }

  .lb-inner img {
    max-width: 100%;
    max-height: calc(100% - 96px);
    object-fit: contain;
    border-radius: 2px;
  }

  .lb-caption {
    color: #EDEAE3;
    text-align: center;
    margin-top: 20px;
    max-width: 640px;
  }
  .lb-caption h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.1em;
  }
  .lb-caption .meta {
    color: #9C968D;
    font-size: 12px;
    letter-spacing: 0.16em;
    margin-top: 4px;
  }
  .lb-caption .desc {
    color: #C9C4BB;
    font-size: 13.5px;
    margin-top: 10px;
    max-height: 4.6em;
    overflow-y: auto;
  }

  .lb-btn {
    position: absolute;
    background: none;
    border: none;
    color: #EDEAE3;
    font-size: 30px;
    line-height: 1;
    cursor: pointer;
    padding: 14px;
    opacity: .75;
    transition: opacity .2s;
    font-family: var(--sans);
  }
  .lb-btn:hover, .lb-btn:focus-visible { opacity: 1; }
  .lb-btn:focus-visible { outline: 2px solid var(--seal); border-radius: 4px; }

  .lb-close { top: 10px; right: 14px; }
  .lb-prev  { left: 4px;  top: 50%; transform: translateY(-50%); }
  .lb-next  { right: 4px; top: 50%; transform: translateY(-50%); }

  @media (max-width: 560px) {
    .lb-inner { padding: 56px 44px 32px; }
    .lb-prev { left: 0; }
    .lb-next { right: 0; }
  }

  footer {
    border-top: 1px solid var(--hairline);
    margin-top: 48px;
    padding-top: 24px;
    color: var(--stone);
    font-size: 12px;
    letter-spacing: 0.18em;
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .skeleton { animation: none; }
    .card { opacity: 1; transform: none; }
  }
</style>
</head>

<body>
<div class="frame">

  <header>
    <div class="masthead">
      <div class="seal" id="seal" aria-hidden="true"></div>
      <div class="titles">
        <h1 id="siteTitle"></h1>
        <p class="subtitle" id="siteSubtitle"></p>
      </div>
    </div>
    <div class="count" id="workCount"></div>
  </header>

  <nav class="filters" id="filters" aria-label="作品分類"></nav>

  <main>
    <div class="gallery" id="gallery"></div>
    <div id="stateBox"></div>
  </main>

  <footer>
    <span id="footerName"></span>
    <span id="footerYear"></span>
  </footer>
</div>

<!-- 燈箱 -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="作品檢視">
  <div class="lb-inner" id="lbInner">
    <img id="lbImage" src="" alt="">
    <div class="lb-caption">
      <h2 id="lbTitle"></h2>
      <p class="meta" id="lbMeta"></p>
      <p class="desc" id="lbDesc"></p>
    </div>
  </div>
  <button class="lb-btn lb-close" id="lbClose" aria-label="關閉">✕</button>
  <button class="lb-btn lb-prev"  id="lbPrev"  aria-label="上一件">‹</button>
  <button class="lb-btn lb-next"  id="lbNext"  aria-label="下一件">›</button>
</div>

<script>
(function () {
  "use strict";

  /* ── 套用站台設定 ── */
  document.title = CONFIG.SITE_TITLE;
  document.getElementById("siteTitle").textContent    = CONFIG.SITE_TITLE;
  document.getElementById("siteSubtitle").textContent = CONFIG.SITE_SUBTITLE;
  document.getElementById("seal").textContent         = CONFIG.SEAL_CHAR;
  document.getElementById("footerName").textContent   = CONFIG.SITE_TITLE;
  document.getElementById("footerYear").textContent   = "© " + new Date().getFullYear();

  const gallery  = document.getElementById("gallery");
  const stateBox = document.getElementById("stateBox");
  const filters  = document.getElementById("filters");
  const countEl  = document.getElementById("workCount");

  let allWorks = [];       // 全部作品
  let shown    = [];       // 目前篩選後顯示中的作品
  let lbIndex  = 0;        // 燈箱目前索引
  let currentCols = 0;     // 目前欄數

  /* ── 狀態畫面 ── */
  function showNotice(glyph, title, html) {
    gallery.innerHTML = "";
    stateBox.innerHTML =
      '<div class="notice"><div class="glyph">' + glyph + "</div><h2>" +
      title + "</h2><p>" + html + "</p></div>";
  }

  /* ── 拼圖式欄位 ── */
  function colCount() {
    const w = window.innerWidth;
    return w < 560 ? 2 : w < 920 ? 3 : 4;
  }

  function makeCols(n) {
    gallery.innerHTML = "";
    const cols = [];
    for (let i = 0; i < n; i++) {
      const c = document.createElement("div");
      c.className = "gcol";
      gallery.appendChild(c);
      cols.push(c);
    }
    return cols;
  }

  function showSkeletons() {
    stateBox.innerHTML = "";
    const cols = makeCols(colCount());
    const heights = [260, 200, 300, 230, 280, 210, 250, 190];
    heights.forEach((h, i) => {
      const s = document.createElement("div");
      s.className = "skeleton";
      s.style.height = h + "px";
      cols[i % cols.length].appendChild(s);
    });
  }

  /* ── 取得資料 ── */
  async function load() {
    if (CONFIG.SUPABASE_URL.includes("YOUR-PROJECT") ||
        CONFIG.SUPABASE_ANON_KEY === "YOUR_ANON_KEY") {
      showNotice("設", "尚未完成設定",
        "請打開 <code>index.html</code>，把最上方「設定區」的 " +
        "<code>SUPABASE_URL</code> 與 <code>SUPABASE_ANON_KEY</code> " +
        "換成你 Supabase 專案的值（Settings → API）。");
      return;
    }

    showSkeletons();

    try {
      const res = await fetch(
        CONFIG.SUPABASE_URL +
          "/rest/v1/works?select=*&order=sort_order.asc,created_at.desc",
        {
          headers: {
            apikey: CONFIG.SUPABASE_ANON_KEY,
            Authorization: "Bearer " + CONFIG.SUPABASE_ANON_KEY
          }
        }
      );
      if (!res.ok) throw new Error("HTTP " + res.status);
      allWorks = await res.json();
    } catch (err) {
      showNotice("誤", "作品載入失敗",
        "請確認網路連線，以及 Supabase 專案是否處於暫停狀態" +
        "（免費專案閒置一週會暫停，到後台按 Restore 即可恢復）。<br>" +
        "錯誤訊息：<code>" + String(err.message).replace(/[<>&]/g, "") + "</code>");
      return;
    }

    if (!allWorks.length) {
      showNotice("空", "還沒有作品",
        "到 Supabase 後台：Storage 上傳圖片 → 複製網址 → " +
        "在 <code>works</code> 資料表新增一列，重新整理就會出現。");
      countEl.textContent = "";
      return;
    }

    buildFilters();
    render(allWorks);
  }

  /* ── 分類篩選 ── */
  function buildFilters() {
    const cats = [...new Set(allWorks.map(w => w.category).filter(Boolean))];
    if (cats.length < 2) return;

    const items = ["全部", ...cats];
    filters.innerHTML = items
      .map((c, i) =>
        '<button class="chip' + (i === 0 ? " active" : "") +
        '" data-cat="' + (i === 0 ? "" : c) + '">' + c + "</button>")
      .join("");
    filters.classList.add("visible");

    filters.addEventListener("click", e => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      filters.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const cat = btn.dataset.cat;
      render(cat ? allWorks.filter(w => w.category === cat) : allWorks);
    });
  }

  /* ── 畫出作品牆 ── */
  function render(list) {
    shown = list;
    stateBox.innerHTML = "";
    countEl.textContent = "共 " + list.length + " 件作品";

    currentCols = colCount();
    const cols = makeCols(currentCols);
    list.forEach((w, i) => {
      const card = document.createElement("button");
      card.className = "card";
      card.style.animationDelay = Math.min(i * 55, 550) + "ms";
      card.setAttribute("aria-label", "檢視作品：" + w.title);

      const img = document.createElement("img");
      img.src = w.image_url;
      img.alt = w.title || "作品";
      img.loading = "lazy";

      const cap = document.createElement("div");
      cap.className = "caption";
      cap.innerHTML =
        '<span class="mark" aria-hidden="true"></span>' +
        '<span class="title"></span>' +
        (w.category ? '<span class="cat"></span>' : "");
      cap.querySelector(".title").textContent = w.title || "";
      if (w.category) cap.querySelector(".cat").textContent = w.category;

      card.appendChild(img);
      card.appendChild(cap);
      card.addEventListener("click", () => openLightbox(i));
      cols[i % cols.length].appendChild(card);
    });
  }

  /* ── 燈箱 ── */
  const lb      = document.getElementById("lightbox");
  const lbImage = document.getElementById("lbImage");
  const lbTitle = document.getElementById("lbTitle");
  const lbMeta  = document.getElementById("lbMeta");
  const lbDesc  = document.getElementById("lbDesc");

  function openLightbox(i) {
    lbIndex = i;
    updateLightbox();
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
    document.getElementById("lbClose").focus();
  }

  function updateLightbox() {
    const w = shown[lbIndex];
    if (!w) return;
    lbImage.src = w.image_url;
    lbImage.alt = w.title || "作品";
    lbTitle.textContent = w.title || "";

    const parts = [];
    if (w.category) parts.push(w.category);
    if (w.created_at) {
      const d = new Date(w.created_at);
      if (!isNaN(d)) {
        parts.push(d.getFullYear() + " 年 " + (d.getMonth() + 1) + " 月");
      }
    }
    lbMeta.textContent = parts.join("　·　");
    lbDesc.textContent = w.description || "";
    lbDesc.style.display = w.description ? "" : "none";
  }

  function closeLightbox() {
    lb.classList.remove("open");
    lbImage.src = "";
    document.body.style.overflow = "";
  }

  function step(delta) {
    if (!shown.length) return;
    lbIndex = (lbIndex + delta + shown.length) % shown.length;
    updateLightbox();
  }

  document.getElementById("lbClose").addEventListener("click", closeLightbox);
  document.getElementById("lbPrev").addEventListener("click", () => step(-1));
  document.getElementById("lbNext").addEventListener("click", () => step(1));

  lb.addEventListener("click", e => {
    if (e.target === lb || e.target.id === "lbInner") closeLightbox();
  });

  document.addEventListener("keydown", e => {
    if (!lb.classList.contains("open")) return;
    if (e.key === "Escape")     closeLightbox();
    if (e.key === "ArrowLeft")  step(-1);
    if (e.key === "ArrowRight") step(1);
  });

  /* 視窗寬度改變、欄數需要增減時，自動重排 */
  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (shown.length && colCount() !== currentCols) render(shown);
    }, 150);
  });

  load();
})();
</script>
</body>
</html>
